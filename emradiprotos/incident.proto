syntax = "proto3";

// Go package name
option go_package = "../emradiprotos"; 

message Incident {
    optional string id = 1;
    map<string, float> location = 2;
    optional string incidentType = 3;
    optional string createdAt = 4;
    optional string createdBy = 5;
    optional string closedAt = 6;
    repeated string updates = 7;
}